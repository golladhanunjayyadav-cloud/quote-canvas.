<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Daily Quotes</title>
        <link rel="icon" type="image-icon" href="1.jpg">
        <link rel="stylesheet" href="Quotes.css"/>
        <script src="quotes_script.js" defer></script>
    </head>
    <body>
        <div class="card">
            <p class="quote-text"></p>
            <p class="quote-author"></p>
            <div class="btn-group">
                <button class="btn" id="btn-prev">⬅ Previous</button>
                <button class="btn" id="btn-fav">❤ Fav</button>
                <button class="btn" id="btn-copy">📋 Copy</button>
                <button class="btn" id="btn-share">🔗 Share</button>
                <button class="btn" id="btn-next">Next ➡</button>
            </div>
        </div>
    </body>
</html>
